name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - backend/**
      - .github/workflows/deploy-backend.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy Backend to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build jar
        working-directory: backend
        run: mvn -B -DskipTests clean package

      - name: Prepare deployment artifact
        shell: bash
        run: |
          set -euo pipefail
          JAR_PATH=$(find backend/target -maxdepth 1 -type f -name "*.jar" ! -name "original-*.jar" | head -n 1)
          if [ -z "${JAR_PATH}" ]; then
            echo "No deployable jar found in backend/target"
            exit 1
          fi
          cp "${JAR_PATH}" backend/target/app.jar
          echo "Using artifact: ${JAR_PATH}"

      - name: Copy jar to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          source: "backend/target/app.jar"
          target: ${{ secrets.EC2_APP_DIR }}
          strip_components: 2
          overwrite: true

      - name: Restart backend service on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.EC2_APP_DIR }}"
            if [ -f .env ]; then
              set -a
              . ./.env
              set +a
            fi
            chmod +x start.sh
            pkill -f 'java.*(finstream|app\.jar)' || true
            sleep 2
            ./start.sh
            sleep 3
            pgrep -f 'java.*(finstream|app\.jar)' > /dev/null
            echo "Backend restarted successfully."
