name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - backend/**
      - .github/workflows/deploy-backend.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy Backend to EC2
    runs-on: ubuntu-latest
    env:
      REMOTE_APP_DIR: /home/ec2-user/finstream
      JAR_NAME: finstream-api-1.0.0.jar
      SERVICE_NAME: finstream.service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build jar
        working-directory: backend
        run: mvn -B -DskipTests clean package

      - name: Verify deployable jar exists
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f "backend/target/${JAR_NAME}" ]; then
            echo "Expected artifact backend/target/${JAR_NAME} not found"
            exit 1
          fi
          echo "Using artifact: backend/target/${JAR_NAME}"

      - name: Copy jar to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          source: "backend/target/${{ env.JAR_NAME }}"
          target: ${{ env.REMOTE_APP_DIR }}
          strip_components: 2
          overwrite: true

      - name: Restart backend service on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            if [ ! -f "${{ env.REMOTE_APP_DIR }}/${{ env.JAR_NAME }}" ]; then
              echo "Deployed jar not found at ${{ env.REMOTE_APP_DIR }}/${{ env.JAR_NAME }}"
              exit 1
            fi
            sudo systemctl restart ${{ env.SERVICE_NAME }}
            sudo systemctl is-active --quiet ${{ env.SERVICE_NAME }}
            echo "Backend restarted successfully via systemd."
